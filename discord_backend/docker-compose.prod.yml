services:
  postgres:
    image: postgres:15-alpine
    container_name: discord-prod-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discord-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: discord-prod-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - discord-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: discord-prod-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - discord-network

  nginx:
    image: nginx:alpine
    container_name: discord-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/discord-clone/frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - discord-network

volumes:
  postgres_data:
  valkey_data:

networks:
  discord-network:
    driver: bridge
